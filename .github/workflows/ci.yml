name: Go CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Check typos
        run: typos

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...

      - name: Run coverage tests
        run: go test -v -cover ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Build
        run: go build ./...
